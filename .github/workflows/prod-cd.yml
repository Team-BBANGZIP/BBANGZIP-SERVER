name: CD – Deploy on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bbangzip-unified-stack-deploy
  cancel-in-progress: false

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Docker image (prod)
        run: |
          echo "[INFO] Removing Docker cache..."
          docker builder prune -af || true
          echo "[INFO] Building Docker image without cache..."
          docker build --no-cache -t ${{ secrets.DOCKER_IMAGE_NAME_PROD }} .
          echo "[INFO] Verifying profile yml files inside image..."
          docker run --rm ${{ secrets.DOCKER_IMAGE_NAME_PROD }} sh -c "test -f /app/application-dev.yml && test -f /app/application-prod.yml"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push prod image to Docker Hub
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME_PROD }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload deploy files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST_PROD || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,nginx/,certbot/"
          target: /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

      - name: SSH & Deploy unified stack to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST_PROD || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -eo pipefail
            cd /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

            echo "[INFO] Writing compose .env and app env files..."
            echo "DOCKER_IMAGE_NAME_DEV=${{ secrets.DOCKER_IMAGE_NAME_DEV }}" > .env
            echo "DOCKER_IMAGE_NAME_PROD=${{ secrets.DOCKER_IMAGE_NAME_PROD }}" >> .env
            echo "${{ secrets.ENV_DEV_FILE }}" > .env.dev
            echo "${{ secrets.ENV_PROD_FILE }}" > .env.prod

            echo "[INFO] Ensuring docker network exists..."
            docker network create bbangzip-network 2>/dev/null || true

            echo "[INFO] Logging in to Docker Hub (pull rate limit / private image)..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "[INFO] Pulling service images (fail deploy if pull fails)..."
            docker compose -f docker-compose.yml pull

            echo "[INFO] Stopping existing unified stack and removing orphans..."
            docker compose -f docker-compose.yml down --remove-orphans || true

            echo "[INFO] Starting unified stack (dev + prod)..."
            docker compose -f docker-compose.yml up -d --force-recreate --remove-orphans

            echo "[INFO] Pruning unused Docker images (free disk; running containers unchanged)..."
            docker image prune -a -f || true
            docker builder prune -af 2>/dev/null || true
