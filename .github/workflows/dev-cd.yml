name: CD – Deploy on develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. gradlew 실행 권한 부여 , 빌드는 Dockerfile에서
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE_NAME_DEV }} .

      # 5. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Docker 이미지 푸시
      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME_DEV }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 7. EC2에 docker-compose-dev.yml 업로드
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload docker-compose to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./docker-compose-dev.yml
          target: /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

      # 8. EC2 접속 후 배포 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

            # 🔧 8080 포트 사용 중인 프로세스가 있으면 강제 종료
            PORT_8080_PID=$(sudo lsof -t -i:8080)
            if [ -n "$PORT_8080_PID" ]; then
              echo "[INFO] Killing process using port 8080: $PORT_8080_PID"
              sudo kill -9 $PORT_8080_PID
            else
              echo "[INFO] No process using port 8080"
            fi

            # 🔧 도커 컨테이너 점유 확인해서 제거 (추가적인 안전망)
            PORT_8080_CONTAINER=$(docker ps -q --filter "publish=8080")
            if [ -n "$PORT_8080_CONTAINER" ]; then
              echo "[INFO] Port 8080 is also used by container: $PORT_8080_CONTAINER"
              docker rm -f $PORT_8080_CONTAINER
            else
              echo "[INFO] No containers using port 8080"
            fi

            # .env 파일 생성
            echo "${{ secrets.ENV_DEV_FILE }}" > .env
            echo "DOCKER_IMAGE_NAME_DEV=${{ secrets.DOCKER_IMAGE_NAME_DEV }}" >> .env

            # 컨테이너 재시작
            docker compose -f docker-compose-dev.yml up -d
