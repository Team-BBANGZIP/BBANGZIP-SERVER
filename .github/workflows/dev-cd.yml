name: CD – Deploy on develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. gradlew 실행 권한 부여 , 빌드는 Dockerfile에서
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. Docker 이미지 빌드 (캐시 비활성화 + YML 확인)
      - name: Build Docker image
        run: |
          echo "[INFO] Removing Docker cache..."
          docker builder prune -af || true
          echo "[INFO] Building Docker image without cache..."
          docker build --no-cache -t ${{ secrets.DOCKER_IMAGE_NAME_DEV }} .
          echo "[INFO] Verifying application-dev.yml inside image..."
          docker run --rm ${{ secrets.DOCKER_IMAGE_NAME_DEV }} sh -c "ls /app | grep application-dev.yml || echo '❌ application-dev.yml not found!'"

      # 5. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Docker 이미지 푸시
      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME_DEV }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 7. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 8. EC2에 docker-compose-dev.yml 업로드
      - name: Upload docker-compose to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./docker-compose-dev.yml
          target: /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

      # 9. EC2 접속 후 배포 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

            # 컨테이너 이름 기반으로 종료
            CONTAINER_NAME=bbangzip-app
            CONTAINER_ID=$(docker ps -q --filter "name=$CONTAINER_NAME")
      
            if [ -n "$CONTAINER_ID" ]; then
              echo "[INFO] Stopping existing container..."
              docker stop $CONTAINER_ID
              docker rm $CONTAINER_ID
            fi

            echo "[INFO] Writing .env file..."
            echo "${{ secrets.ENV_DEV_FILE }}" > .env
            echo "DOCKER_IMAGE_NAME_DEV=${{ secrets.DOCKER_IMAGE_NAME_DEV }}" >> .env

            echo "[INFO] Pulling latest app image..."
            docker compose -f docker-compose-dev.yml pull app

            echo "[INFO] Starting new container (force recreate)..."
            docker compose -f docker-compose-dev.yml up -d --force-recreate
