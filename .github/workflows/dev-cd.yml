name: CD – Deploy on develop

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. gradlew 실행 권한 부여 , 빌드는 Dockerfile에서
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 4. Docker 이미지 빌드
      - name: Build Docker image
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_IMAGE_NAME_DEV }} .

      # 5. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 6. Docker 이미지 푸시
      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_IMAGE_NAME_DEV }}

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 7. EC2에 docker-compose-dev.yml 업로드
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload docker-compose to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ./docker-compose-dev.yml
          target: /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

      # 8. EC2 접속 후 배포 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/apps/${{ secrets.PROJECT_NAME }}

            # 컨테이너 이름 기반으로 종료
            CONTAINER_NAME=bbangzip-app
            CONTAINER_ID=$(docker ps -q --filter "name=$CONTAINER_NAME")
      
            if [ -n "$CONTAINER_ID" ]; then
            echo "[INFO] Stopping and removing container: $CONTAINER_NAME ($CONTAINER_ID)"
            docker stop $CONTAINER_ID
            docker rm $CONTAINER_ID
            else
            echo "[INFO] No running container named: $CONTAINER_NAME"
            fi

            # .env 파일 생성
            echo "${{ secrets.ENV_DEV_FILE }}" > .env
            echo "DOCKER_IMAGE_NAME_DEV=${{ secrets.DOCKER_IMAGE_NAME_DEV }}" >> .env

            # 컨테이너 재시작
            docker compose -f docker-compose-dev.yml up -d
