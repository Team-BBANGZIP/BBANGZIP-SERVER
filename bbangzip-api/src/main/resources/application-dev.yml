server:
  port: 8080
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:mysql://bbangzip-db.cfcgs6kiy5mn.ap-northeast-2.rds.amazonaws.com:3306/bbangzip-dev?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: redis-dev
      port: 6379
      timeout: 6000

  jpa:
    hibernate:
      ddl-auto: update
      show-sql: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            provider: kakao
            client-id: ${KAKAO_CLIENT_ID}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
          apple:
            provider: apple
            client-id: ${APPLE_CLIENT_ID}
            authorization-grant-type: authorization_code
            scope:
              - openid
              - name
              - email
            client-name: Apple
            redirect-uri: ${APPLE_REDIRECT_URI}
        provider:
          apple:
            authorization-uri: https://appleid.apple.com/auth/authorize
            token-uri: https://appleid.apple.com/auth/token
            jwk-set-uri: https://appleid.apple.com/auth/keys
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expire-time: ${JWT_ACCESS_TOKEN_EXPIRE_TIME}
  refresh-token-expire-time: ${JWT_REFRESH_TOKEN_EXPIRE_TIME}

# 선택: 가입 알림 테스트 시 EC2 `.env.dev` 또는 `ENV_DEV_FILE`에 DISCORD_SIGNUP_WEBHOOK_URL=...
# prod 채널과 분리하려면 디스코드에서 테스트용 웹훅 URL을 따로 쓰는 것을 권장.
discord:
  signup:
    webhook-url: ${DISCORD_SIGNUP_WEBHOOK_URL:}