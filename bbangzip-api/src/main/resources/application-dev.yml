server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://bbangzipdb.chem0wowwomv.ap-northeast-2.rds.amazonaws.com:3306/bbangzip
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expire-time: 1209600000    # 14일 (단위: ms)
  refresh-token-expire-time: 1209600000   # 14일 (단위: ms)
