version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: bbangzip-redis
    restart: always
    networks:
      - bbangzip-network

  app:
    image: ${DOCKER_IMAGE_NAME_DEV}
    container_name: bbangzip-app
    restart: always
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - bbangzip-network

  nginx:
    image: nginx:1.27-alpine
    container_name: bbangzip-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - bbangzip-network

  certbot:
    image: certbot/certbot:latest
    container_name: bbangzip-certbot
    restart: always
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h & wait $$!
        done
    networks:
      - bbangzip-network

networks:
  bbangzip-network:
    external: true
